# ShopZone: full-stack demo in one command
#
#   docker compose up -d --build
#
# What comes up (all self-provisioning, no manual steps):
#   http://localhost:3001  ShopZone storefront (demo accounts below)
#   http://localhost:3000  Merchant dashboard  (demo-merchant@shopzone.com / demo1234)
#   http://localhost:8001  Store API docs at /docs
#   http://localhost:8000  Return Policy Engine API docs at /docs
#
# Demo storefront logins (password: demo1234):
#   demo.trusted@shopzone.com -> returns get auto-APPROVED by the ML engine
#   demo.risky@shopzone.com   -> returns get flagged or auto-DENIED

services:
  # ---------------- Return Policy Engine ----------------
  engine-db:
    image: postgres:15-alpine
    container_name: rpe_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: return_engine
    volumes:
      - engine_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build: ./backend
    container_name: rpe_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@engine-db:5432/return_engine
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      # Auto-provisioned demo merchant; the store below uses the same API key
      DEMO_MERCHANT_EMAIL: demo-merchant@shopzone.com
      DEMO_MERCHANT_PASSWORD: ${DEMO_MERCHANT_PASSWORD:-demo1234}
      DEMO_API_KEY: ${DEMO_API_KEY:-rpe_demo_compose_key_change_in_prod_1}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    depends_on:
      engine-db:
        condition: service_healthy
    volumes:
      - engine_models:/app/ml/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s  # first boot trains the initial model

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: rpe_dashboard
    ports:
      - "3000:3000"
    depends_on:
      - engine

  # ---------------- ShopZone storefront ----------------
  store-db:
    image: postgres:15-alpine
    container_name: shopzone_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    volumes:
      - store_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  store-api:
    build: ./ecommerce/backend
    container_name: shopzone_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@store-db:5432/ecommerce_db
      SECRET_KEY: ${STORE_SECRET_KEY:-ecommerce-secret-key-change-in-production}
      AUTO_SEED: "true"
      IMPORT_CATALOG: "true"
      RETURN_ENGINE_URL: http://engine:8000/api/v1
      RETURN_ENGINE_API_KEY: ${DEMO_API_KEY:-rpe_demo_compose_key_change_in_prod_1}
    ports:
      - "8001:8001"
    depends_on:
      store-db:
        condition: service_healthy
      engine:
        condition: service_healthy

  store-web:
    build:
      context: ./ecommerce/frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    container_name: shopzone_web
    ports:
      - "3001:3001"
    depends_on:
      - store-api

volumes:
  engine_postgres_data:
  store_postgres_data:
  engine_models:
